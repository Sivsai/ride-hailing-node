version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ride-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ride-hailing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/postgres_data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
  
  redis:
    image: redis:7
    container_name: ride-redis
    ports:
      - "6379:6379"
  
  auth-service:
    build: ./auth-service
    container_name: ride-auth
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      DATABASE_URL: postgresql://postgre:postgres@postgres:5432/ride_hailing
      JWT_EXPIRY_HOURS: 24
    depends_on:
      - postgres
  
  geo-service:
    build: ./geo-service
    container_name: ride-geo
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
  
  rides-service:
    build: ./rides-service
    container_name: ride-rides
    ports:
      - "8083:8083"
    environment:
      PORT: 8083
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ride_hailing
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      AUTH_SERVICE_URL: http://auth-service:8081
      GEO_SERVICE_URL: http://geo-service:8082
    depends_on:
      - postgres
      - redis
      - auth-service
      - geo-service


volumes:
  postgres_data:


   